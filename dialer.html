<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams Autodialer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
    h1 { margin-bottom: 0.5rem; color: #7b68ee; }
    .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }

    .container { width: 100%; max-width: 700px; }

    /* Input area */
    .input-area { margin-bottom: 1.5rem; }
    .input-area label { display: block; margin-bottom: 0.4rem; font-weight: 600; }
    .input-area textarea {
      width: 100%; height: 120px; padding: 0.75rem; border: 1px solid #333;
      border-radius: 8px; background: #16213e; color: #e0e0e0; font-family: monospace;
      font-size: 0.95rem; resize: vertical;
    }
    .input-area textarea:focus { outline: none; border-color: #7b68ee; }
    .input-area .hint { font-size: 0.8rem; color: #666; margin-top: 0.3rem; }

    .btn-row { display: flex; gap: 0.75rem; margin-top: 0.75rem; }
    button {
      padding: 0.6rem 1.2rem; border: none; border-radius: 6px; font-size: 0.95rem;
      cursor: pointer; font-weight: 600; transition: background 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #7b68ee; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #6a5acd; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #c0392b; }
    .btn-secondary { background: #333; color: #e0e0e0; }
    .btn-secondary:hover:not(:disabled) { background: #444; }

    /* Status bar */
    .status-bar {
      background: #16213e; border: 1px solid #333; border-radius: 8px;
      padding: 1rem 1.25rem; margin-bottom: 1.5rem; text-align: center;
    }
    .status-bar .current-number { font-size: 1.8rem; font-weight: 700; color: #7b68ee; letter-spacing: 1px; }
    .status-bar .current-name { font-size: 1rem; color: #aaa; margin-top: 0.2rem; }
    .status-bar .progress { font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
    .status-bar .instruction {
      margin-top: 0.75rem; padding: 0.5rem; background: #1a1a2e; border-radius: 6px;
      font-size: 0.95rem; color: #f0c040;
    }
    .status-bar .instruction kbd {
      background: #333; padding: 0.15rem 0.5rem; border-radius: 4px;
      border: 1px solid #555; font-family: monospace; color: #fff;
    }

    /* Call list */
    .call-list { list-style: none; }
    .call-list li {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 0.75rem; border-radius: 6px; margin-bottom: 0.25rem;
      font-family: monospace; font-size: 0.9rem; transition: background 0.15s;
    }
    .call-list li.done { color: #555; }
    .call-list li.done .status-icon::before { content: '✓'; color: #2ecc71; }
    .call-list li.skipped { color: #555; }
    .call-list li.skipped .status-icon::before { content: '⏭'; }
    .call-list li.current { background: #1e2a4a; color: #7b68ee; font-weight: 600; }
    .call-list li.current .status-icon::before { content: '📞'; }
    .call-list li.pending .status-icon::before { content: '·'; color: #555; }
    .status-icon { width: 1.5rem; text-align: center; flex-shrink: 0; }
    .call-list .name { color: #aaa; margin-left: auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .call-list li.done .name, .call-list li.skipped .name { color: #444; }

    .hidden { display: none; }

    /* Idle state */
    .idle-message { text-align: center; color: #666; padding: 2rem; font-size: 1.1rem; }

    /* Preflight */
    .preflight {
      background: #16213e; border: 1px solid #333; border-radius: 8px;
      padding: 0.75rem 1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem;
    }
    .preflight .indicator { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .preflight .indicator.unknown { background: #555; }
    .preflight .indicator.pass { background: #2ecc71; }
    .preflight .indicator.fail { background: #e74c3c; }
    .preflight .msg { font-size: 0.85rem; flex: 1; }
    .preflight button { font-size: 0.8rem; padding: 0.4rem 0.8rem; }
  </style>
</head>
<body>
  <h1>Teams Autodialer</h1>
  <p class="subtitle">Dial through a list of numbers using Microsoft Teams</p>

  <div class="container">
    <!-- Preflight Check -->
    <div class="preflight" id="preflight">
      <div class="indicator unknown" id="preflightIndicator"></div>
      <span class="msg" id="preflightMsg">Click "Test Teams" to verify the Teams desktop app can receive calls from this browser.</span>
      <button class="btn-secondary" id="testBtn">Test Teams</button>
    </div>

    <!-- Input Phase -->
    <div id="inputArea" class="input-area">
      <label for="numberInput">Phone Numbers</label>
      <textarea id="numberInput" placeholder="Paste numbers, one per line. Optional name after a comma:&#10;+15551234567, John Smith&#10;+15559876543, Jane Doe&#10;+15550001111"></textarea>
      <p class="hint">One number per line. Optionally add a name after a comma.</p>
      <div class="btn-row">
        <button class="btn-primary" id="startBtn">Start Dialing</button>
      </div>
    </div>

    <!-- Dialing Phase -->
    <div id="dialingArea" class="hidden">
      <div class="status-bar">
        <div class="current-number" id="currentNumber">—</div>
        <div class="current-name" id="currentName"></div>
        <div class="progress" id="progress"></div>
        <div class="instruction" id="instruction"></div>
      </div>

      <div class="btn-row" style="margin-bottom: 1rem; justify-content: center;">
        <button class="btn-primary" id="dialBtn">Dial Current</button>
        <button class="btn-secondary" id="skipBtn">Skip (S)</button>
        <button class="btn-danger" id="stopBtn">Stop</button>
      </div>

      <ul class="call-list" id="callList"></ul>
    </div>

    <!-- Idle -->
    <div id="idleArea" class="idle-message hidden">
      All done! Reload to start a new session.
    </div>
  </div>

  <script>
    const State = { IDLE: 'idle', READY: 'ready', WAITING: 'waiting' };
    let entries = [];
    let currentIndex = -1;
    let dialState = State.IDLE;

    const $ = id => document.getElementById(id);

    function parseInput(text) {
      return text.trim().split('\n')
        .map(line => line.trim())
        .filter(line => line.length > 0)
        .map(line => {
          const comma = line.indexOf(',');
          if (comma !== -1) {
            return { number: line.slice(0, comma).trim(), name: line.slice(comma + 1).trim(), status: 'pending' };
          }
          return { number: line, name: '', status: 'pending' };
        });
    }

    // Normalize to E.164. US-default: bare 10-digit numbers get +1 prepended,
    // and 11-digit numbers starting with 1 get a + prepended. Numbers with an
    // explicit leading + are kept as-is (validated 8-15 digits per ITU E.164).
    // Returns null for anything that doesn't fit.
    function normalizeNumber(raw) {
      if (!raw) return null;
      const trimmed = raw.trim();
      const hasPlus = trimmed.startsWith('+');
      const digits = trimmed.replace(/\D/g, '');
      if (hasPlus) {
        if (digits.length < 8 || digits.length > 15) return null;
        return '+' + digits;
      }
      if (digits.length === 10) return '+1' + digits;
      if (digits.length === 11 && digits.startsWith('1')) return '+' + digits;
      return null;
    }

    function renderList() {
      const list = $('callList');
      list.innerHTML = '';
      entries.forEach((entry, i) => {
        const li = document.createElement('li');
        li.className = i === currentIndex ? 'current' : entry.status;

        const icon = document.createElement('span');
        icon.className = 'status-icon';
        const num = document.createElement('span');
        num.textContent = entry.number;
        li.appendChild(icon);
        li.appendChild(num);
        if (entry.name) {
          const name = document.createElement('span');
          name.className = 'name';
          name.textContent = entry.name;
          li.appendChild(name);
        }
        list.appendChild(li);
      });
    }

    function updateStatus() {
      const entry = entries[currentIndex];
      if (!entry) return;
      $('currentNumber').textContent = entry.number;
      $('currentName').textContent = entry.name;

      const done = entries.filter(e => e.status === 'done').length;
      const skipped = entries.filter(e => e.status === 'skipped').length;
      $('progress').textContent = `${currentIndex + 1} of ${entries.length} | ${done} called | ${skipped} skipped`;

      if (dialState === State.READY) {
        $('instruction').innerHTML = 'Press <kbd>Space</kbd> to dial';
        $('dialBtn').disabled = false;
      } else if (dialState === State.WAITING) {
        $('instruction').innerHTML = 'Call in progress — press <kbd>Space</kbd> when done to advance';
        $('dialBtn').disabled = true;
      }
    }

    function launchTeams(url) {
      const a = document.createElement('a');
      a.href = url;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function dialCurrent() {
      if (currentIndex < 0 || currentIndex >= entries.length) return;
      const entry = entries[currentIndex];
      const num = normalizeNumber(entry.number);
      if (!num) {
        $('instruction').textContent =
          'Invalid number — must be E.164 format (e.g. +15551234567). Skipping.';
        entry.status = 'skipped';
        renderList();
        setTimeout(advance, 1200);
        return;
      }
      const url = `msteams:/l/call/0/0?users=4:${encodeURIComponent(num)}`;
      launchTeams(url);
      entry.status = 'done';
      dialState = State.WAITING;
      updateStatus();
      renderList();
    }

    function advance() {
      currentIndex++;
      while (currentIndex < entries.length && entries[currentIndex].status === 'skipped') {
        currentIndex++;
      }
      if (currentIndex >= entries.length) {
        $('dialingArea').classList.add('hidden');
        $('idleArea').classList.remove('hidden');
        return;
      }
      dialState = State.READY;
      updateStatus();
      renderList();
    }

    function skipCurrent() {
      if (currentIndex < 0 || currentIndex >= entries.length) return;
      if (entries[currentIndex].status === 'pending') {
        entries[currentIndex].status = 'skipped';
      }
      advance();
    }

    // Preflight test — opens the Teams app via its bare protocol URL. This is the
    // most reliable probe: no target, no malformed deep link, just "launch Teams".
    $('testBtn').addEventListener('click', () => {
      launchTeams('msteams://');
      const indicator = $('preflightIndicator');
      const msg = $('preflightMsg');

      // We can't truly detect if Teams handled it, so ask the user.
      indicator.className = 'indicator unknown';
      msg.textContent = '';

      const prompt = document.createElement('span');
      prompt.textContent = 'Teams should have opened (or focused). Did it? ';
      const yesLink = document.createElement('a');
      yesLink.href = '#';
      yesLink.textContent = 'Yes';
      yesLink.style.color = '#2ecc71';
      const sep = document.createTextNode(' · ');
      const noLink = document.createElement('a');
      noLink.href = '#';
      noLink.textContent = 'No';
      noLink.style.color = '#e74c3c';
      msg.appendChild(prompt);
      msg.appendChild(yesLink);
      msg.appendChild(sep);
      msg.appendChild(noLink);

      yesLink.addEventListener('click', (e) => {
        e.preventDefault();
        indicator.className = 'indicator pass';
        msg.textContent = 'Teams is working. You\'re good to go!';
      });
      noLink.addEventListener('click', (e) => {
        e.preventDefault();
        indicator.className = 'indicator fail';
        msg.textContent =
          'Teams didn\'t open. Make sure the Teams desktop app is installed and that your browser is allowed to open msteams: links (you may need to approve a browser prompt the first time).';
      });
    });

    // Start
    $('startBtn').addEventListener('click', () => {
      entries = parseInput($('numberInput').value);
      if (entries.length === 0) return;
      $('inputArea').classList.add('hidden');
      $('dialingArea').classList.remove('hidden');
      currentIndex = -1;
      advance();
    });

    $('dialBtn').addEventListener('click', () => {
      if (dialState === State.READY) dialCurrent();
    });

    $('skipBtn').addEventListener('click', () => {
      if (dialState === State.READY) skipCurrent();
    });

    $('stopBtn').addEventListener('click', () => {
      entries = [];
      currentIndex = -1;
      dialState = State.IDLE;
      $('callList').innerHTML = '';
      $('currentNumber').textContent = '—';
      $('currentName').textContent = '';
      $('progress').textContent = '';
      $('instruction').textContent = '';
      $('dialingArea').classList.add('hidden');
      $('idleArea').classList.add('hidden');
      $('inputArea').classList.remove('hidden');
    });

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      // Ignore if typing in textarea
      if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;

      if (e.code === 'Space') {
        e.preventDefault();
        if (dialState === State.READY) {
          dialCurrent();
        } else if (dialState === State.WAITING) {
          advance();
        }
      }

      if (e.code === 'KeyS') {
        e.preventDefault();
        if (dialState === State.READY) {
          skipCurrent();
        }
      }
    });
  </script>
</body>
</html>
